<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENA성공 방어덱</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#1f2430;
    color:white;
    margin:0;
    padding:20px;
}

.back{
    margin-bottom:20px;
}

h1{
    text-align:center;
}

.card{
    background:#2b3245;
    padding:15px;
    border-radius:15px;
    border:1px solid #3c4458;
}

.defense-title{
    background:#e67e22;
    color:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.defense-title:hover{
    background:#cf711b;
}

.detail-page{
    display:none;
}

.block{
    background:#343d52;
    border:1px solid #4b556e;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.section-title{
    color:#7fb3ff;
    font-weight:bold;
    margin-bottom:6px;
}

.big-content{
    white-space:pre-wrap;
    line-height:1.4;
}

.info-table{
    width:100%;
    border-collapse:collapse;
}

.info-table td{
    padding:4px 6px;
    border-bottom:1px solid #3c4458;
}

.info-table td:first-child{
    color:#6ea8ff;
    font-weight:bold;
}

.back-list{
    background:#4f7cff;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 15px;
    cursor:pointer;
    margin-bottom:15px;
}

</style>

</head>

<body>

<button class="back" onclick="location.href='index.html'">
← 메인으로
</button>

<h1>🛡 SENA성공 방어덱</h1>

<div class="card">

<div id="listPage">

<h3>추천 방어덱</h3>

<div id="defenseList">
불러오는 중...
</div>

</div>

<div id="detailPage" class="detail-page">

<button class="back-list" onclick="showList()">
← 목록
</button>

<div id="detailContent"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB1mVzVlotzO_SOW8EEZkYTdMfXEQ0QxrA",
  authDomain: "sena-success.firebaseapp.com",
  projectId: "sena-success",
  storageBucket: "sena-success.appspot.com",
  messagingSenderId: "467131130722",
  appId: "1:467131130722:web:1c72ca31d052ee55afc23b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function showList(){
    document.getElementById("listPage").style.display="block";
    document.getElementById("detailPage").style.display="none";
}

function showDetail(title, html){

    document.getElementById("listPage").style.display="none";
    document.getElementById("detailPage").style.display="block";

    document.getElementById("detailContent").innerHTML = `
        <h2 style="margin-top:0">${title}</h2>
        ${html}
    `;
}


const defenseData = {};

function showDetail(id){

    const d = defenseData[id];

    if(!d) return;

    // 반지
    let ringText="-";

    if(typeof d.ring==="object"){

        ringText=`
        <table class="info-table">
        ${Object.entries(d.ring).map(([hero,ring])=>`
        <tr>
        <td>${hero}</td>
        <td>${ring}</td>
        </tr>
        `).join("")}
        </table>
        `;

    }else{

        ringText=d.ring||"-";

    }

    // 진형
    let formationText="-";

    if(typeof d.formation==="object"){

        formationText=`
        <table class="info-table">
        <tr><td>진형</td><td>${d.formation.type}</td></tr>
        <tr><td>앞줄</td><td>${d.formation.front}</td></tr>
        <tr><td>뒷줄</td><td>${d.formation.back}</td></tr>
        </table>
        `;

    }else{

        formationText=d.formation||"-";

    }

    // 장비
    let itemText="-";

    if(typeof d.items==="object"){

        itemText=`
        <table class="info-table">
        ${Object.entries(d.items).map(([hero,data])=>`
        <tr>
        <td>${hero}</td>
        <td>${(data.set||"").replaceAll(","," / ")}</td>
        <td>${(data.option||"").replaceAll(","," / ")}</td>
        </tr>
        `).join("")}
        </table>
        `;

    }else{

        itemText=d.items||"-";

    }

    document.getElementById("listPage").style.display="none";
    document.getElementById("detailPage").style.display="block";

    document.getElementById("detailContent").innerHTML=`

<div class="block">
<div class="section-title">🐻 추천 펫</div>
<div class="big-content">${d.pet||"-"}</div>
</div>

<div class="grid">

<div class="block">
<div class="section-title">💍 추천 반지</div>
<div class="big-content">${ringText}</div>
</div>

<div class="block">
<div class="section-title">🛡 추천 진형</div>
<div class="big-content">${formationText}</div>
</div>

</div>

<div class="block">
<div class="section-title">🔥 스킬순서</div>
<div class="big-content">${d.skills||"-"}</div>
</div>

<div class="block">
<div class="section-title">⚔ 장비세팅</div>
<div class="big-content">${itemText}</div>
</div>

<div class="block">
<div class="section-title">📝 설명 및 팁</div>
<div class="big-content">${d.memo||"-"}</div>
</div>

`;

}




function loadDefenses(){

db.collection("defenses").onSnapshot(snap=>{

let listHtml="";

snap.forEach(doc=>{

const d = doc.data();
const id = doc.id;

defenseData[id] = d;

let ringText="-";

if(typeof d.ring==="object"){

ringText=`
<table class="info-table">
${Object.entries(d.ring).map(([hero,ring])=>`
<tr>
<td>${hero}</td>
<td>${ring}</td>
</tr>
`).join("")}
</table>
`;

}else{

ringText=d.ring||"-";

}

let formationText="-";

if(typeof d.formation==="object"){

formationText=`
<table class="info-table">
<tr><td>진형</td><td>${d.formation.type}</td></tr>
<tr><td>앞줄</td><td>${d.formation.front}</td></tr>
<tr><td>뒷줄</td><td>${d.formation.back}</td></tr>
</table>
`;

}else{

formationText=d.formation||"-";

}

let itemText="-";

if(typeof d.items==="object"){

itemText=`
<table class="info-table">

${Object.entries(d.items).map(([hero,data])=>`

<tr>

<td>${hero}</td>

<td>${(data.set||"").replaceAll(","," / ")}</td>

<td>${(data.option||"").replaceAll(","," / ")}</td>

</tr>

`).join("")}

</table>
`;

}else{

itemText=d.items||"-";

}

listHtml += `

<div
class="defense-title"
onclick="showDetail('${id}')"
>

${d.title || (d.heroes||[]).join(" / ")}

</div>

`;

});

if(listHtml===""){

listHtml="등록된 방어덱이 없습니다.";

}

document.getElementById("defenseList").innerHTML=listHtml;

});

}

loadDefenses();

</script>

</body>
</html>
