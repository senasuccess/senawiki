async function addCharacter(){

    const name = document.getElementById("characterName").value.trim();

    if(!name) return;

    await db.collection("characters").add({
        name: name
    });

    alert("캐릭터 추가 완료");

    document.getElementById("characterName").value = "";

    loadCharacters();
}

async function loadCharacters(){

    const snap = await db.collection("characters").get();

    let docs = snap.docs;

    docs.sort((a,b)=>
        a.data().name.localeCompare(b.data().name,'ko')
    );

    characterNames = docs.map(doc=>doc.data().name);

    let html = "";

    docs.forEach(doc=>{

        const c = doc.data();

        html += `
        <div style="display:flex;align-items:center;justify-content:space-between;margin:5px 0;padding:10px;background:#eee;border-radius:8px;">

            <div style="display:flex;align-items:center;gap:10px;">

                <span>${c.name}</span>

                <button onclick="deleteCharacter('${doc.id}')">
삭제
</button>

            </div>

        </div>
        `;

    });

    document.getElementById("characterList").innerHTML = html;

   

}

async function deleteCharacter(id){

    if(!confirm("캐릭터를 삭제할까요?")) return;

    await db.collection("characters").doc(id).delete();

    alert("캐릭터 삭제 완료");

    loadCharacters();
}

async function addGuide(){

    const heroes = [
        document.getElementById("hero1").value,
        document.getElementById("hero2").value,
        document.getElementById("hero3").value
    ].filter(v => v);

    // 반지
    const ring = {};

    document.querySelectorAll(".ring-input").forEach(input=>{
        ring[input.dataset.hero] = input.value;
    });

    // 장비
    const items = {};

    heroes.forEach(hero=>{

        const set = document.querySelector(`.set-input[data-hero="${hero}"]`)?.value || "";
        const option = document.querySelector(`.option-input[data-hero="${hero}"]`)?.value || "";

        items[hero] = {
            set:set,
            option:option
        };

    });

    const guide = {

        enemy:[
            document.getElementById("enemy1").value,
            document.getElementById("enemy2").value,
            document.getElementById("enemy3").value
        ],

        heroes:heroes,

        title:heroes.join(" / "),

        speed:document.getElementById("guideSpeed").value,

        ring:ring,

        pet:document.getElementById("guidePet").value,

        formation:{
            type:document.getElementById("formationType").value,
            front:document.getElementById("frontLine").value,
            back:document.getElementById("backLine").value
        },

        skills:document.getElementById("guideSkills").value,

        items:items,

        memo:document.getElementById("guideMemo").value

    };

    if(editingGuideId){

        await db.collection("guides")
            .doc(editingGuideId)
            .update(guide);

        alert("공략 수정 완료");

        editingGuideId = null;
        document.getElementById("guideBtn").innerText = "공략 저장";

    }else{

        await db.collection("guides").add(guide);

        alert("공략 저장 완료");

    }

    loadGuides();

}

function generateGuideInputs(){

    const heroes = [

        document.getElementById("hero2").value,
        document.getElementById("hero3").value

    // 반지
    let ringHtml = "<label>추천 반지</label>";

    heroes.forEach(hero=>{

        ringHtml += `
        <div style="display:flex;align-items:center;margin-bottom:8px;gap:10px;">
            <div style="width:90px;font-weight:bold;">
                ${hero}
            </div>

            <input
                class="ring-input"
                data-hero="${hero}"
                placeholder="반지 입력"
                style="flex:1;">
        </div>
        `;

    });

    document.getElementById("ringContainer").innerHTML = ringHtml;

    // 장비

    let itemHtml = "<label>장비세팅</label>";

    heroes.forEach(hero=>{

        itemHtml += `
        <div style="
            background:#343d52;
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
        ">

            <b>${hero}</b>

            <input
                class="set-input"

                placeholder="세트">

            <input
                class="option-input"
                data-hero="${hero}"
                placeholder="옵션">

        </div>
        `;

    });

    document.getElementById("itemContainer").innerHTML = itemHtml;

}

document.querySelectorAll(".ring-input").forEach(input=>{

const items = {};

document.querySelectorAll(".set-input").forEach(input=>{

});

document.querySelectorAll(".option-input").forEach(input=>{

});

const defense = {

},

};

async function editGuide(id){

    const doc = await db.collection("guides").doc(id).get();

    const g = doc.data();

    editingGuideId = id;

    document.getElementById("enemy1").value = g.enemy?.[0] || "";
    document.getElementById("enemy2").value = g.enemy?.[1] || "";
    document.getElementById("enemy3").value = g.enemy?.[2] || "";

    // 영웅
    if(g.heroes){
        document.getElementById("hero1").value = g.heroes[0] || "";
        document.getElementById("hero2").value = g.heroes[1] || "";
        document.getElementById("hero3").value = g.heroes[2] || "";
    }else{
        const heroes = (g.title || "").split(" / ");

        document.getElementById("hero1").value = heroes[0] || "";
        document.getElementById("hero2").value = heroes[1] || "";
        document.getElementById("hero3").value = heroes[2] || "";
    }

    // 자동 입력칸 생성
    generateGuideInputs();

    // 반지
    if(g.ring){

        document.querySelectorAll(".ring-input").forEach(input=>{

            input.value = g.ring[input.dataset.hero] || "";

        });

    }

    // 장비
    if(g.items){

        Object.keys(g.items).forEach(hero=>{

            const setInput =
                document.querySelector(`.set-input[data-hero="${hero}"]`);

            const optionInput =
                document.querySelector(`.option-input[data-hero="${hero}"]`);

            if(setInput)
                setInput.value = g.items[hero].set || "";

            if(optionInput)
                optionInput.value = g.items[hero].option || "";

        });

    }

    // 펫
    document.getElementById("guidePet").value = g.pet || "";

    // 진형
    if(g.formation){

        document.getElementById("formationType").value =
            g.formation.type || "기본진형";

        document.getElementById("frontLine").value =
            g.formation.front || "";

        document.getElementById("backLine").value =
            g.formation.back || "";

    }

    document.getElementById("guideSpeed").value = g.speed || "";

    document.getElementById("guideSkills").value =
        Array.isArray(g.skills)
            ? g.skills.join("\n")
            : (g.skills || "");

    document.getElementById("guideMemo").value =
        g.memo || "";

    document.getElementById("guideBtn").innerText =
        "공략 수정 저장";

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}

let selectedIndex = -1;

function searchHero(input,resultId){

    const box = document.getElementById(resultId);

    const keyword = input.value.trim();

    if(keyword===""){

        box.style.display="none";
        return;

    }

   let result;

if(input.id.startsWith("hero")){

    const used = ["hero1","hero2","hero3"]
        .filter(id => id !== input.id)
        .map(id => document.getElementById(id).value)
        .filter(v => v);

    result = characterNames.filter(name =>
        name.startsWith(keyword) &&
        !used.includes(name)
    );

}else{

    // 상대 입력은 중복 허용
    result = characterNames.filter(name =>
        name.startsWith(keyword)
    );

}

    selectedIndex = -1;

    box.innerHTML = "";

    result.forEach((name,index)=>{

        box.innerHTML += `
        <div
        class="hero-option"
        data-index="${index}"
        onclick="
    document.getElementById('${input.id}').value='${name}';
    document.getElementById('${resultId}').style.display='none';

    if('${input.id}'.startsWith('hero')){
        generateGuideInputs();
    }
"
        style="
        padding:8px 10px;
        cursor:pointer;
        border-bottom:1px solid #eee;
        ">
        ${name}
        </div>
        `;

    });

    box.style.display = result.length ? "block" : "none";

    input.onkeydown=function(e){

        const items = box.querySelectorAll(".hero-option");

        if(!items.length) return;

        if(e.key==="ArrowDown"){

            e.preventDefault();

            selectedIndex++;

            if(selectedIndex>=items.length)
                selectedIndex=0;

            refresh();

        }

        if(e.key==="ArrowUp"){

            e.preventDefault();

            selectedIndex--;

            if(selectedIndex<0)
                selectedIndex=items.length-1;

            refresh();

        }

        if(e.key==="Enter"){

            if(selectedIndex>=0){

                e.preventDefault();

                items[selectedIndex].click();

            }

        }

        if(e.key==="Escape"){

            box.style.display="none";

        }

        function refresh(){

            items.forEach(item=>{

                item.style.background="white";
                item.style.color="black";

            });

            items[selectedIndex].style.background="#4f7cff";
            items[selectedIndex].style.color="white";

            items[selectedIndex].scrollIntoView({
                block:"nearest"
            });

        }

    };

}

    ].filter(v=>v);

    // 반지
    let ringHtml = "<label>추천 반지</label>";

    heroes.forEach(hero=>{

        ringHtml += `
        <div style="display:flex;align-items:center;margin-bottom:8px;gap:10px;">

            <div style="width:90px;font-weight:bold;">
                ${hero}
            </div>

            <input
                class="ring-input"
                data-hero="${hero}"
                placeholder="반지 입력"
                style="flex:1;">

        </div>
        `;

    });

    document.getElementById("defRingContainer").innerHTML = ringHtml;


    // 장비
    let itemHtml = "<label>장비세팅</label>";

    heroes.forEach(hero=>{

        itemHtml += `
        <div style="
            background:#343d52;
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
        ">

            <b>${hero}</b>

            <input
                class="set-input"
                data-hero="${hero}"
                placeholder="세트">

            <input
                class="option-input"
                data-hero="${hero}"
                placeholder="옵션">

        </div>
        `;

    });

    document.getElementById("defItemContainer").innerHTML = itemHtml;

}



loadCharacters();
loadGuides();
loadDefenses();

console.log("관리자 페이지 정상 실행");
</script>

</body>
</html>
