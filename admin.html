*{

body{
    font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;

    padding:20px;
    color:#222;
}


h1{
    text-align:center;

    font-size:28px;
}


.card{
    background:white;
    padding:20px;
    border-radius:16px;

}

    padding-bottom:10px;

input,

    width:100%;

    margin-bottom:10px;

    font-size:14px;

}



button{

    border:none;
    background:#4f7cff;
    color:white;

    padding:10px 15px;

    border-radius:10px;

    cursor:pointer;

    font-weight:bold;

    margin:3px;

}



.hero-option{

    padding:10px;

}



.hero-option:hover{

}



#characterList > div,
#guideList > div,

    background:#f8f9fc !important;

    border:1px solid #e5e7eb;

}



label{

    display:block;

    font-weight:bold;

    margin-top:15px;

}



select{

    cursor:pointer;

}



@media(max-width:600px){

    body{

        padding:10px;

    }


    h1{

        font-size:22px;

    }


    .card{

        padding:15px;

}

const db = firebase.firestore();

/* =========================
   캐릭터
========================= */

async function addCharacter(){

    const name = document.getElementById("characterName").value.trim();

    if(!name) return;

    await db.collection("characters").add({
        name: name
    });

    alert("캐릭터 추가 완료");

    document.getElementById("characterName").value = "";

    loadCharacters();
}

async function loadCharacters(){

    const snap = await db.collection("characters").get();

    let docs = snap.docs;

    docs.sort((a,b)=>
        a.data().name.localeCompare(b.data().name,'ko')
    );


    charactersData = docs.map(doc => ({
        id: doc.id,
        name: doc.data().name
    }));

    characterNames = charactersData.map(c => c.name);


    let html = "";


    docs.forEach(doc=>{

        const c = doc.data();


        html += `
        <div style="display:flex;align-items:center;justify-content:space-between;margin:5px 0;padding:10px;background:#eee;border-radius:8px;">

            <div style="display:flex;align-items:center;gap:10px;">

                <span>${c.name}</span>

                <button onclick="renameCharacter('${doc.id}','${c.name}')">
                    이름변경
                </button>

                <button onclick="deleteCharacter('${doc.id}')">
                    삭제
                </button>

            </div>

        </div>
        `;

    });


    document.getElementById("characterList").innerHTML = html;

}



async function fixMissingHeroIds(){

    const snap = await db.collection("guides").get();

    let count = 0;

    for(const doc of snap.docs){

        const g = doc.data();

        if(!Array.isArray(g.heroes)) continue;


        const fixedHeroes = g.heroes.map(hero=>{

            if(hero.id){
                return hero;
            }


            const find = charactersData.find(c=>c.name === hero.name);


            return {
                id: find ? find.id : "",
                name: hero.name
            };

        });


        await db.collection("guides")
        .doc(doc.id)
        .update({
            heroes: fixedHeroes
        });


        count++;

    }


    alert(count+"개 수정 완료");

    loadGuides();

}





async function convertOldGuides(){

    if(!confirm("기존 공략 데이터를 새 구조로 변환할까요?")) return;


    const snap = await db.collection("guides").get();

    let count = 0;


    for(const doc of snap.docs){

        const g = doc.data();


        // 이미 변환된 데이터는 제외
        if(!Array.isArray(g.heroes)) continue;

        if(typeof g.heroes[0] !== "string") continue;


        const newHeroes = g.heroes.map(name=>{

            const hero = charactersData.find(c=>c.name === name);


            return {
                id: hero ? hero.id : "",
                name:name
            };

        });


        await db.collection("guides")
        .doc(doc.id)
        .update({
            heroes:newHeroes
        });


        count++;

    }


    alert(count+"개 공략 변환 완료");

    loadGuides();

}


async function convertOldEnemies(){

    const snap = await db.collection("guides").get();

    let count = 0;


    for(const doc of snap.docs){

        const g = doc.data();

        if(!Array.isArray(g.enemy)) continue;

        if(typeof g.enemy[0] !== "string") continue;


        const newEnemy = g.enemy.map(name=>{

            const hero = charactersData.find(c=>c.name === name);

            return {
                id: hero ? hero.id : "",
                name:name
            };

        });


        await db.collection("guides")
        .doc(doc.id)
        .update({
            enemy:newEnemy
        });


        count++;

    }


    alert(count+"개 상대 변환 완료");

    loadGuides();

}

async function fixMissingEnemyIds(){

    const snap = await db.collection("guides").get();

    let count = 0;


    for(const doc of snap.docs){

        const g = doc.data();


        if(!Array.isArray(g.enemy)) continue;


        const fixedEnemy = g.enemy.map(enemy=>{


            if(enemy.id){
                return enemy;
            }


            const renameMap = {
    "칼헤론":"칼헤롱"
};

const searchName = renameMap[enemy.name] || enemy.name;

const find = charactersData.find(c=>c.name === searchName);


            return {
                id: find ? find.id : "",
                name: enemy.name
            };

        });


        await db.collection("guides")
        .doc(doc.id)
        .update({
            enemy: fixedEnemy
        });


        count++;

    }


    alert(count+"개 상대ID 수정 완료");

    loadGuides();

}


async function deleteCharacter(id){

    if(!confirm("캐릭터를 삭제할까요?")) return;

    await db.collection("characters").doc(id).delete();

    alert("캐릭터 삭제 완료");

    loadCharacters();
}

async function renameCharacter(id, oldName){

    const newName = prompt(
        "변경할 캐릭터 이름을 입력하세요",
        oldName
    );

    if(!newName) return;

    await db.collection("characters")
    .doc(id)
    .update({
        name:newName.trim()
    });


    alert("이름 변경 완료");

    loadCharacters();

}

async function addGuide(){

    const heroes = [
    document.getElementById("hero1"),
    document.getElementById("hero2"),
    document.getElementById("hero3")
]
.filter(input => input.value)
.map(input => ({
    id: input.dataset.id || "",
    name: input.value
}));

    // 반지
const ring = {};

document.querySelectorAll(".ring-input").forEach(input=>{

    const hero = heroes.find(h => h.name === input.dataset.hero);

    if(hero){
        ring[hero.id] = input.value;
    }

});

    // 장비
    const items = {};

    heroes.forEach(hero=>{

    const set = document.querySelector(`.set-input[data-hero="${hero.name}"]`)?.value || "";
    const option = document.querySelector(`.option-input[data-hero="${hero.name}"]`)?.value || "";

    items[hero.id] = {
        set:set,
        option:option
    };

});

    const guide = {

        enemy:[
            document.getElementById("enemy1").value,
            document.getElementById("enemy2").value,
            document.getElementById("enemy3").value
        ],

        heroes:heroes,

        title:heroes.map(h=>h.name).join(" / "),

        speed:document.getElementById("guideSpeed").value,

        ring:ring,

        pet:document.getElementById("guidePet").value,

        formation:{
            type:document.getElementById("formationType").value,
            front:document.getElementById("frontLine").value,
            back:document.getElementById("backLine").value
        },

        skills:document.getElementById("guideSkills").value,

        items:items,

        memo:document.getElementById("guideMemo").value

    };

    if(editingGuideId){

        await db.collection("guides")
            .doc(editingGuideId)
            .update(guide);

        alert("공략 수정 완료");

        editingGuideId = null;
        document.getElementById("guideBtn").innerText = "공략 저장";

    }else{

        await db.collection("guides").add(guide);

        alert("공략 저장 완료");

    }

    loadGuides();

}

function generateGuideInputs(){

    
        // 기존 반지/장비 저장
    const oldRing = {};

    document.querySelectorAll(".ring-input").forEach(input=>{
        oldRing[input.dataset.hero] = input.value;
    });


    const oldItems = {};

    document.querySelectorAll(".set-input").forEach(input=>{

        const hero = input.dataset.hero;

        oldItems[hero] = {
            set: input.value,
            option:
            document.querySelector(`.option-input[data-hero="${hero}"]`)?.value || ""
        };

    });
    
    const heroes = [
        document.getElementById("hero1").value,
        document.getElementById("hero2").value,
        document.getElementById("hero3").value
    ].filter(v=>v);

    // 반지
    let ringHtml = "<label>추천 반지</label>";

    heroes.forEach(hero=>{

        ringHtml += `
        <div style="display:flex;align-items:center;margin-bottom:8px;gap:10px;">
            <div style="width:90px;font-weight:bold;">
                ${hero}
            </div>

            <input
class="ring-input"
data-hero="${hero}"
value="${oldRing[hero] || ""}"
placeholder="반지 입력"
style="flex:1;">
        </div>
        `;

    });

    document.getElementById("ringContainer").innerHTML = ringHtml;

    // 장비

    let itemHtml = "<label>장비세팅</label>";

    heroes.forEach(hero=>{

        itemHtml += `
        <div style="
            background:#343d52;
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
        ">

            <b>${hero}</b>

            <input
    class="set-input"
    data-hero="${hero}"
    value="${oldItems[hero]?.set || ""}"
    placeholder="세트">

<input
    class="option-input"
    data-hero="${hero}"
    value="${oldItems[hero]?.option || ""}"
    placeholder="옵션">

        </div>
        `;

    });

    document.getElementById("itemContainer").innerHTML = itemHtml;

}

async function loadGuides(){

    const snap = await db.collection("guides").get();

    let html = "";


    snap.forEach(doc=>{

        const g = doc.data();


        let heroes = [];


        if(Array.isArray(g.heroes)){

            heroes = g.heroes.map(hero=>{


                // 새 저장 방식
                if(typeof hero === "object"){

    return {
        id: hero.id || "",
        name: hero.name || ""
    };

}


                // 기존 저장 방식
                return {
                    id:"",
                    name:hero
                };


            });

        }


        html += `
<div style="
padding:12px;
background:#eee;
margin-bottom:12px;
border-radius:10px;
">

<b>
${heroes.map(h=>h.name).join(" / ")}
</b>

<br>

<small>
상대 :
${g.enemy ? g.enemy.map(e=>{

    if(typeof e === "string"){
        return e;
    }

    return e.name || "";

}).join(" / ") : "-"}
</small>

<br><br>

<button onclick="editGuide('${doc.id}')">
수정
</button>

<button onclick="deleteGuide('${doc.id}')">
삭제
</button>

</div>
`;

    });


    document.getElementById("guideList").innerHTML = html;

}

/* =========================
   시작
========================= */

let editingDefenseId = null;

async function addDefense(){

    const heroes = [
        document.getElementById("defHero1"),
        document.getElementById("defHero2"),
        document.getElementById("defHero3")
    ]
    .filter(input => input.value)
    .map(input => ({
        id: input.dataset.id || "",
        name: input.value
    }));


    const ring = {};


    // 반지 저장
    document.querySelectorAll(".ring-input").forEach(input=>{

        const id = input.dataset.id;

        if(id){

            ring[id] = input.value;

        }

    });



    const items = {};


    // 장비 세트 저장
    document.querySelectorAll(".set-input").forEach(input=>{

        const id = input.dataset.id;

        if(id){

            if(!items[id]){
                items[id] = {};
            }

            items[id].set = input.value;

        }

    });



    // 장비 옵션 저장
    document.querySelectorAll(".option-input").forEach(input=>{

        const id = input.dataset.id;

        if(id){

            if(!items[id]){
                items[id] = {};
            }

            items[id].option = input.value;

        }

    });



    const defense = {

        heroes: heroes,

        title: heroes.map(h=>h.name).join(" / "),

        ring: ring,

        pet: document.getElementById("defPet").value,


        formation:{
            type:document.getElementById("defFormationType").value,
            front:document.getElementById("defFront").value,
            back:document.getElementById("defBack").value
        },


        skills: document.getElementById("defSkills").value,

        items: items,

        memo: document.getElementById("defMemo").value

    };



    if(editingDefenseId){


        await db.collection("defenses")
        .doc(editingDefenseId)
        .set(defense);


        alert("방어덱 수정 완료");


        editingDefenseId = null;


        document.getElementById("defBtn").innerText="방어덱 저장";


    }else{


        await db.collection("defenses")
        .add(defense);


        alert("방어덱 저장 완료");


    }



    document.getElementById("defHero1").value = "";
    document.getElementById("defHero2").value = "";
    document.getElementById("defHero3").value = "";


    document.getElementById("defPet").value = "";

    document.getElementById("defFormationType").selectedIndex=0;

    document.getElementById("defFront").value="";

    document.getElementById("defBack").value="";

    document.getElementById("defSkills").value="";

    document.getElementById("defMemo").value="";

async function loadDefenses(){

    const snap = await db.collection("defenses").get();

    let html = "";

    snap.forEach(doc=>{

        const d = doc.data();

        let heroes = [];


        if(Array.isArray(d.heroes)){

            heroes = d.heroes.map(h=>{

                // 기존 저장 방식
                if(typeof h === "string"){

                    return {
                        id:"",
                        name:h
                    };

                }


                // 새 저장 방식
                return {
                    id:h.id || "",
                    name:h.name || ""
                };

            });

        }


        html += `
        <div style="
        background:#eee;
        padding:10px;
        margin-bottom:10px;
        border-radius:8px;
        ">

            <b>
            ${heroes.map(h=>h.name).join(" / ")}
            </b>

            <br><br>

            <button onclick="editDefense('${doc.id}')">
            수정
            </button>

            <button onclick="deleteDefense('${doc.id}')">
            삭제
            </button>

        </div>
        `;

    });


    document.getElementById("defenseList").innerHTML = html;

}

async function editGuide(id){

    const doc = await db.collection("guides").doc(id).get();

    const g = doc.data();

    editingGuideId = id;


    // 상대 복원
    if(g.enemy){

        const enemy = g.enemy.map(e=>{

            if(typeof e === "string"){
                return e;
            }

            return e.name || "";

        });


        document.getElementById("enemy1").value = enemy[0] || "";
        document.getElementById("enemy2").value = enemy[1] || "";
        document.getElementById("enemy3").value = enemy[2] || "";

    if(g.ring){

        document.querySelectorAll(".ring-input").forEach(input=>{

            const heroName = input.dataset.hero;

            const heroData = (g.heroes || [])
                .find(h=>h.name === heroName);


            if(heroData){

                g.ring[heroData.id] || "";

            }

        });

    }    // 장비 복원
    if(g.items){

        document.querySelectorAll(".set-input").forEach(input=>{

            const heroName = input.dataset.hero;

            const heroData = (g.heroes || [])
                .find(h=>h.name === heroName);


            if(heroData){

                input.value =
                g.items[heroData.id]?.set || "";

            }

        });


        document.querySelectorAll(".option-input").forEach(input=>{

            const heroName = input.dataset.hero;

            const heroData = (g.heroes || [])
                .find(h=>h.name === heroName);


            if(heroData){

                input.value =
                g.items[heroData.id]?.option || "";

            }

        });

    }



    // 펫
    document.getElementById("guidePet").value =
        g.pet || "";



    // 진형
    if(g.formation){

        document.getElementById("formationType").value =
            g.formation.type || "기본진형";


        document.getElementById("frontLine").value =
            g.formation.front || "";


        document.getElementById("backLine").value =
            g.formation.back || "";

    }



    // 속공
    document.getElementById("guideSpeed").value =
        g.speed || "";



    // 스킬
    document.getElementById("guideSkills").value =
        Array.isArray(g.skills)
            ? g.skills.join("\n")
            : (g.skills || "");



    // 설명 및 팁
    document.getElementById("guideMemo").value =
        g.memo || "";



    document.getElementById("guideBtn").innerText =
        "공략 수정 저장";



    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}

function searchHero(input,resultId){

    const box = document.getElementById(resultId);

    if(keyword===""){

        box.style.display="none";
        return;

    }

   let result;

if(input.id.startsWith("hero")){

    const used = ["hero1","hero2","hero3"]
        .filter(id => id !== input.id)
        .map(id => document.getElementById(id).value)
        .filter(v => v);

    result = characterNames.filter(name =>
        name.startsWith(keyword) &&
        !used.includes(name)
    );

}else{

    // 상대 입력은 중복 허용
    result = characterNames.filter(name =>
        name.startsWith(keyword)
    );

}

    selectedIndex = -1;

    box.innerHTML = "";

    result.forEach((name,index)=>{

    const hero = charactersData.find(c=>c.name===name);

    const heroId = hero ? hero.id : "";

        box.innerHTML += `
        <div
        class="hero-option"
        data-index="${index}"
        onclick="
    document.getElementById('${input.id}').value='${name}';

    document.getElementById('${input.id}').dataset.id='${heroId}';

    document.getElementById('${resultId}').style.display='none';

    if('${input.id}'.startsWith('hero')){

    generateGuideInputs();

}


if('${input.id}'.startsWith('defHero')){

    generateDefenseInputs();

}
"
        style="
        padding:8px 10px;
        cursor:pointer;
        border-bottom:1px solid #eee;
        ">
        ${name}
        </div>
        `;

    });

    box.style.display = result.length ? "block" : "none";

    input.onkeydown=function(e){

        const items = box.querySelectorAll(".hero-option");

        if(!items.length) return;

        if(e.key==="ArrowDown"){

            e.preventDefault();

            selectedIndex++;

            if(selectedIndex>=items.length)
                selectedIndex=0;

            refresh();

        }

        if(e.key==="ArrowUp"){

            e.preventDefault();

            selectedIndex--;

            if(selectedIndex<0)
                selectedIndex=items.length-1;

            refresh();

        }

        if(e.key==="Enter"){

            if(selectedIndex>=0){

                e.preventDefault();

                items[selectedIndex].click();

            }

        }

        if(e.key==="Escape"){

            box.style.display="none";

        }

        function refresh(){

            items.forEach(item=>{

                item.style.background="white";
                item.style.color="black";

            });

            items[selectedIndex].style.background="#4f7cff";
            items[selectedIndex].style.color="white";

            items[selectedIndex].scrollIntoView({
                block:"nearest"
            });

        }

    };

}


function generateDefenseInputs(){

    const oldRing = {};
    const oldItems = {};


    // 현재 입력값 보관
    document.querySelectorAll(".ring-input").forEach(input=>{

        if(input.dataset.id){

            oldRing[input.dataset.id] = input.value;

        }

    });


    document.querySelectorAll(".set-input").forEach(input=>{

        const id = input.dataset.id;

        if(id){

            oldItems[id] = {

                set: input.value,

                option:
                document.querySelector(
                    `.option-input[data-id="${id}"]`
                )?.value || ""

            };

        }

    });



    const heroes = [
        document.getElementById("defHero1"),
        document.getElementById("defHero2"),
        document.getElementById("defHero3")
    ]
    .filter(input=>input.value)
    .map(input=>({

        id: input.dataset.id || "",
        name: input.value

    }));



    // 반지 생성

    let ringHtml = "<label>추천 반지</label>";


    heroes.forEach(hero=>{


        ringHtml += `

        <div style="
        display:flex;
        align-items:center;
        margin-bottom:8px;
        gap:10px;
        ">

        <div style="
        width:90px;
        font-weight:bold;
        ">
        ${hero.name}
        </div>


        <input
        class="ring-input"
        data-id="${hero.id}"
        data-hero="${hero.name}"
        value="${oldRing[hero.id] || ""}"
        placeholder="반지 입력"
        style="flex:1;">

        </div>

        `;


    });


    document.getElementById("defRingContainer").innerHTML = ringHtml;




    // 장비 생성

    let itemHtml="<label>장비세팅</label>";


    heroes.forEach(hero=>{


        itemHtml += `

        <div style="
        background:#343d52;
        padding:12px;
        border-radius:10px;
        margin-bottom:15px;
        ">


        <b>${hero.name}</b>


        <input
        class="set-input"
        data-id="${hero.id}"
        data-hero="${hero.name}"
        value="${oldItems[hero.id]?.set || ""}"
        placeholder="세트">


        <input
        class="option-input"
        data-id="${hero.id}"
        data-hero="${hero.name}"
        value="${oldItems[hero.id]?.option || ""}"
        placeholder="옵션">


        </div>

        `;


    });


    document.getElementById("defItemContainer").innerHTML=itemHtml;


}
